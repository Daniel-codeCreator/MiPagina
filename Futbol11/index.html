<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futbol11</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>FUTBOL<span>11</span></h1>
    <div id="equipoInfo" class="equipo-info"></div>
    <div id="fallosDisplay" class="fallos-display"></div>
  </header>

  <main>
    <div id="cancha">
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
      <div class="slot"></div>
    </div>

    <div id="panel">
      <div class="formacion-selector-wrap">
        <label for="selectorFormacion">Formación Táctica:</label>
        <select id="selectorFormacion">
          <option value="4-3-3">4-3-3 (Clásica)</option>
          <option value="4-2-3-1">4-2-3-1 (Moderna)</option>
          <option value="4-4-2">4-4-2 (Vieja Escuela)</option>
          <option value="4-1-2-1-3">4-1-2-1-3 (Tu Rombo - 11 Jugadores)</option>
        </select>
      </div>

      <p class="panel-hint">Adivina los <strong>11 jugadores</strong> del equipo.<br>Tienes 5 fallos antes de perder.</p>
      
      <div class="search-wrap">
        <input id="buscarJugador" type="text" placeholder="Escribe un jugador..." autocomplete="off" spellcheck="false" />
        <button id="btnIntentar">→</button>
        <div id="suggestions"></div>
      </div>
      
      <p id="mensaje" class="mensaje"></p>
      <div id="progreso" class="progreso">0 / 11 jugadores colocados</div>
    </div>
  </main>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-content">
      <h3 id="modal-titulo">¿Dónde colocas al jugador?</h3>
      <div id="modal-botones" class="modal-botones"></div>
      <button id="modal-cancelar">Cancelar</button>
    </div>
  </div>

  <script src="equipos.js"></script>
  <script src="app.js"></script>
</body>
</html>
